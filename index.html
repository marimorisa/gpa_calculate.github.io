<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA計算ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 900px; margin: auto; box-sizing: border-box; }
        .form-section { background-color: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #ddd; }
        
        .form-group { margin-bottom: 15px; display: flex; align-items: center; }
        label { display: inline-block; width: 130px; font-weight: bold; flex-shrink: 0; }
        input[type="text"], input[type="number"], select { padding: 8px; flex-grow: 1; max-width: 300px; border: 1px solid #ccc; border-radius: 3px; }
        
        .btn { padding: 8px 15px; border: none; cursor: pointer; border-radius: 3px; color: white; font-size: 14px; }
        .btn-primary { background-color: #005a9c; }
        .btn-primary:hover { background-color: #004070; }
        .btn-danger { background-color: #cc0000; }
        .btn-danger:hover { background-color: #990000; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        .btn-edit { background-color: #ffc107; color: #212529; }
        .btn-edit:hover { background-color: #e0a800; }
        .btn-sm { padding: 5px 10px; font-size: 12px; margin-right: 2px; }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { border-collapse: collapse; width: 100%; min-width: 750px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; vertical-align: middle; }
        th { background-color: #f4f4f4; white-space: nowrap; }
        
        th.sortable { cursor: pointer; user-select: none; position: relative; padding-right: 20px; }
        th.sortable:hover { background-color: #e0e0e0; }
        .sort-icon { font-size: 10px; color: #555; position: absolute; right: 5px; top: 50%; transform: translateY(-50%); }

        .text-center { text-align: center; }
        .edit-input { width: 100%; box-sizing: border-box; padding: 5px; font-size: 13px; }
        .edit-input-num { width: 60px; box-sizing: border-box; padding: 5px; font-size: 13px; }

        .results { margin-top: 30px; padding: 15px; background-color: #eef7ff; border-radius: 5px; border: 1px solid #bce0fd; }
        .results h3 { margin-top: 0; color: #004070; }
        .excluded { color: #aaa; background-color: #fafafa; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .search-box { background-color: #fffae6; padding: 15px; border-radius: 5px; margin-bottom: 25px; border: 1px solid #ffe8a1; }
        .dept-box { background-color: #e6f7ff; padding: 15px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #91d5ff; }

        @media screen and (max-width: 768px) {
            body { padding: 10px; }
            .form-group { flex-direction: column; align-items: stretch; margin-bottom: 10px; }
            label { width: 100%; margin-bottom: 5px; }
            input[type="text"], input[type="number"], select { max-width: 100%; width: 100%; }
            .header-flex { flex-direction: column; align-items: flex-start; gap: 10px; }
            .btn { width: 100%; margin-bottom: 5px; box-sizing: border-box; }
            .action-buttons { display: flex; flex-direction: column; gap: 5px; }
            .action-buttons .btn { margin: 0; }
        }
    </style>
</head>
<body>

    <h2>GPA計算ツール</h2>
    
    <div class="form-section">
        <div class="dept-box form-group">
            <label>所属学科:</label>
            <select id="departmentSelect" onchange="updateView()">
                <option value="life_science">生命薬科学科 (選択科目は上位14単位)</option>
                <option value="pharmacy">薬学科 (選択科目は上位10単位)</option>
            </select>
        </div>

        <div class="search-box">
            <strong>🔍 開講時期から科目を検索・自動入力</strong>
            <p style="font-size: 13px; color: #666; margin: 5px 0 10px;">※検索すると、下の入力フォームに「時期」と「科目名」が自動でセットされます。</p>
            <div class="form-group">
                <label>時期で絞り込み:</label>
                <select id="termSelect" onchange="updateCourseDropdown()">
                    <option value="">-- 選択してください --</option>
                    <option value="1年前期">1年前期</option>
                    <option value="1年後期">1年後期</option>
                    <option value="1年通期">1年通期</option>
                    <option value="2年前期">2年前期</option>
                    <option value="2年後期">2年後期</option>
                    <option value="2年通期">2年通期</option>
                    <option value="3年前期">3年前期</option>
                </select>
            </div>
            <div class="form-group">
                <label style="margin-bottom:0;">対象科目:</label>
                <select id="courseSelect" onchange="fillCourseName()">
                    <option value="">-- 先に時期を選んでください --</option>
                </select>
            </div>
        </div>

        <h3 style="margin-top:0; color:#333; font-size:16px;">📝 個別入力フォーム</h3>
        <div class="form-group">
            <label>開講時期:</label>
            <select id="inputTerm">
                <option value="その他">-- 自由に選択 (または「その他」) --</option>
                <option value="1年前期">1年前期</option>
                <option value="1年後期">1年後期</option>
                <option value="1年通期">1年通期</option>
                <option value="2年前期">2年前期</option>
                <option value="2年後期">2年後期</option>
                <option value="2年通期">2年通期</option>
                <option value="3年前期">3年前期</option>
                <option value="3年後期">3年後期</option>
                <option value="3年通期">3年通期</option>
                <option value="4年前期">4年前期</option>
                <option value="4年後期">4年後期</option>
                <option value="4年通期">4年通期</option>
                <option value="5年前期">5年前期</option>
                <option value="5年後期">5年後期</option>
                <option value="6年前期">6年前期</option>
                <option value="6年後期">6年後期</option>
                <option value="その他">その他</option>
            </select>
        </div>
        <div class="form-group">
            <label>科目名:</label>
            <input type="text" id="courseName" placeholder="例: 経済学入門">
        </div>
        <div class="form-group">
            <label>単位数:</label>
            <input type="number" id="credits" min="1" value="2">
        </div>
        <div class="form-group">
            <label>点数 (0-100):</label>
            <input type="number" id="score" min="0" max="100" placeholder="例: 85">
        </div>
        <div class="form-group">
            <label>科目区分:</label>
            <select id="category">
                <option value="specialized_compulsory">専門科目 (必修)</option>
                <option value="specialized_elective">専門科目 (選択)</option>
                <option value="liberal">教養科目 (初期値: その他)</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="addCourse()">科目を追加して計算</button>
    </div>

    <div class="results">
        <h3>GPA 計算結果</h3>
        <p><strong>教養科目 GPA:</strong> <span id="gpaLiberal">0.00</span></p>
        <p><strong>専門科目(必修) GPA:</strong> <span id="gpaCompulsory">0.00</span></p>
        <p><strong>専門科目(選択) GPA:</strong> <span id="gpaElective">0.00</span> <small id="electiveNote1">(※成績上位14単位分のみ計算)</small></p>
        <hr>
        <p><strong>総合 GPA:</strong> <span id="gpaTotal">0.00</span> <small id="electiveNote2">(※選択科目は上位14単位分のみ合算)</small></p>
    </div>

    <div class="header-flex" style="margin-top: 30px;">
        <h2 style="margin: 0;">登録済みの科目</h2>
        <button class="btn btn-danger" onclick="resetAllData()">全データをリセット</button>
    </div>
    
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th class="text-center">計算</th>
                    <th class="sortable" onclick="sortTable('term')">時期 <span id="sort-term" class="sort-icon"></span></th>
                    <th class="sortable" onclick="sortTable('name')">科目名 <span id="sort-name" class="sort-icon"></span></th>
                    <th class="sortable" onclick="sortTable('category')">区分 <span id="sort-category" class="sort-icon"></span></th>
                    <th class="sortable" onclick="sortTable('credits')">単位 <span id="sort-icon"></span></th>
                    <th class="sortable" onclick="sortTable('score')">点数 <span id="sort-score" class="sort-icon"></span></th>
                    <th class="sortable" onclick="sortTable('gradePoint')">評点 <span id="sort-gradePoint" class="sort-icon"></span></th>
                    <th class="text-center">操作</th>
                </tr>
            </thead>
            <tbody id="courseList">
                </tbody>
        </table>
    </div>

    <script>
        const courseDatabase = {
            "1年前期": ["薬学概論Ⅰ", "薬学有機化学Ⅰ", "薬品分析化学", "生薬学Ⅰ"],
            "1年後期": ["基礎生物化学", "薬学有機化学Ⅱ", "機能形態学Ⅰ", "薬学物理化学Ⅰ"],
            "1年通期": ["AMEC", "PBL"],
            "2年前期": ["機能形態学Ⅱ", "製剤学Ⅰ", "薬剤学Ⅰ", "有機反応化学Ⅰ", "有機反応化学Ⅱ", "薬学無機化学", "薬学概論Ⅱ", "環境衛生学", "生物薬品化学Ⅰ", "薬理学Ⅰ", "薬学英語Ⅰ", "薬学英語Ⅱ", "地域医療学基礎", "薬学物理化学Ⅱ"],
            "2年後期": ["製剤学Ⅱ", "薬学物理化学Ⅲ", "衛生化学", "薬理学Ⅱ", "生物統計学Ⅰ", "生物統計学Ⅱ", "有機反応化学Ⅲ", "薬剤学Ⅱ", "生薬学Ⅱ", "生物薬品化学Ⅱ", "微生物感染症学", "細胞生物学Ⅰ", "物理系実習Ⅰ", "物理系実習Ⅱ", "化学系実習Ⅰ", "化学系実習Ⅱ", "化学系実習Ⅲ"],
            "2年通期": ["先端薬科学"],
            "3年前期": ["薬学英語Ⅲ", "有機化学演習", "免疫学", "医薬品情報学", "病態生化学", "構造生物学", "有機反応化学Ⅳ", "薬理学Ⅲ", "臨床薬理学Ⅰ", "薬学英語Ⅳ", "医薬品代謝学", "臨床薬理学Ⅱ"]
        };

        const allTerms = ["1年前期", "1年後期", "1年通期", "2年前期", "2年後期", "2年通期", "3年前期", "3年後期", "3年通期", "4年前期", "4年後期", "4年通期", "5年前期", "5年後期", "6年前期", "6年後期", "その他"];

        let courses = [];
        let editingIndex = -1;
        let currentSortColumn = '';
        let isSortAscending = true;

        function findTermByName(name) {
            for (let term in courseDatabase) {
                if (courseDatabase[term].includes(name)) return term;
            }
            return "その他";
        }

        window.onload = function() {
            const savedDept = localStorage.getItem('gpa_department');
            if (savedDept) document.getElementById('departmentSelect').value = savedDept;

            const savedData = localStorage.getItem('gpa_courses_data');
            if (savedData) {
                courses = JSON.parse(savedData);
                courses.forEach(c => {
                    if (c.isIncluded === undefined) c.isIncluded = true;
                    if (c.term === undefined) c.term = findTermByName(c.name);
                });
            }
            updateView();
        };

        function updateCourseDropdown() {
            const term = document.getElementById('termSelect').value;
            const courseSelect = document.getElementById('courseSelect');
            
            courseSelect.innerHTML = '<option value="">-- 科目を選択してください --</option>';
            const enteredCourseNames = courses.map(c => c.name);

            if (term && courseDatabase[term]) {
                let count = 0;
                courseDatabase[term].forEach(course => {
                    if (!enteredCourseNames.includes(course)) {
                        const option = document.createElement('option');
                        option.value = course;
                        option.textContent = course;
                        courseSelect.appendChild(option);
                        count++;
                    }
                });
                if (count === 0) courseSelect.innerHTML = '<option value="">(この時期の科目はすべて登録済みです)</option>';
            } else if (!term) {
                courseSelect.innerHTML = '<option value="">-- 先に時期を選んでください --</option>';
            }
        }

        function fillCourseName() {
            const courseSelect = document.getElementById('courseSelect');
            const termSelect = document.getElementById('termSelect');
            if (courseSelect.value) {
                document.getElementById('courseName').value = courseSelect.value;
                // 自動で入力フォームの「開講時期」も同期させる
                document.getElementById('inputTerm').value = termSelect.value;
            }
        }

        function saveData() {
            localStorage.setItem('gpa_courses_data', JSON.stringify(courses));
            localStorage.setItem('gpa_department', document.getElementById('departmentSelect').value);
        }

        function resetAllData() {
            if (confirm("登録されているすべての成績データを削除し、完全にリセットしますか？\n（この操作は取り消せません）")) {
                courses = [];
                editingIndex = -1;
                localStorage.removeItem('gpa_courses_data');
                updateView();
            }
        }

        function getGradePoint(score) {
            if (score >= 90) return 4.0;
            if (score >= 80) return 3.0;
            if (score >= 70) return 2.0;
            if (score >= 60) return 1.0;
            return 0.0;
        }

        function getCategoryName(val) {
            if (val === 'liberal') return '教養科目';
            if (val === 'specialized_compulsory') return '専門科目(必修)';
            if (val === 'specialized_elective') return '専門科目(選択)';
            return '';
        }

        function addCourse() {
            let term = document.getElementById('inputTerm').value;
            const name = document.getElementById('courseName').value || '無名科目';
            const credits = parseFloat(document.getElementById('credits').value);
            const score = parseFloat(document.getElementById('score').value);
            const category = document.getElementById('category').value;
            
            // 時期が「その他」のままでも、名前からデータベースに存在するかチェックして補完
            if (term === "その他") {
                const foundTerm = findTermByName(name);
                if (foundTerm !== "その他") term = foundTerm;
            }

            if (isNaN(credits) || isNaN(score)) {
                alert("単位数と点数を正しく入力してください。");
                return;
            }

            const gradePoint = getGradePoint(score);

            courses.push({ term, name, credits, score, gradePoint, category, isIncluded: true });
            
            // フォームリセット
            document.getElementById('courseName').value = '';
            document.getElementById('score').value = '';
            document.getElementById('courseSelect').value = '';
            document.getElementById('inputTerm').value = 'その他';
            
            updateView();
        }

        function deleteCourse(index) {
            if (confirm(`「${courses[index].name}」を削除しますか？`)) {
                courses.splice(index, 1);
                editingIndex = -1;
                updateView();
            }
        }

        function toggleInclude(index) {
            if (editingIndex === index) return;
            courses[index].isIncluded = !courses[index].isIncluded;
            updateView();
        }

        function startEdit(index) {
            editingIndex = index;
            renderTable();
        }

        function cancelEdit() {
            editingIndex = -1;
            renderTable();
        }

        function saveEdit(index) {
            const tr = document.getElementById(`row-${index}`);
            const newTerm = tr.querySelector('.edit-term').value;
            const newName = tr.querySelector('.edit-name').value;
            const newCategory = tr.querySelector('.edit-category').value;
            const newCredits = parseFloat(tr.querySelector('.edit-credits').value);
            const newScore = parseFloat(tr.querySelector('.edit-score').value);

            if (isNaN(newCredits) || isNaN(newScore) || newName.trim() === "") {
                alert("科目名、単位数、点数を正しく入力してください。");
                return;
            }

            courses[index].term = newTerm;
            courses[index].name = newName;
            courses[index].category = newCategory;
            courses[index].credits = newCredits;
            courses[index].score = newScore;
            courses[index].gradePoint = getGradePoint(newScore);

            editingIndex = -1;
            updateView();
        }

        function sortTable(column) {
            if (currentSortColumn === column) {
                isSortAscending = !isSortAscending;
            } else {
                currentSortColumn = column;
                isSortAscending = true;
            }

            courses.sort((a, b) => {
                let valA = a[column];
                let valB = b[column];

                if (column === 'category') {
                    valA = getCategoryName(valA);
                    valB = getCategoryName(valB);
                }

                if (valA === valB) return 0;

                if (typeof valA === 'string') {
                    return isSortAscending ? valA.localeCompare(valB, 'ja') : valB.localeCompare(valA, 'ja');
                } else {
                    return isSortAscending ? valA - valB : valB - valA;
                }
            });

            editingIndex = -1; 
            updateView();
        }

        function updateSortIcons() {
            const keys = ['term', 'name', 'category', 'credits', 'score', 'gradePoint'];
            keys.forEach(key => {
                const iconSpan = document.getElementById(`sort-${key}`);
                if (iconSpan) {
                    if (currentSortColumn === key) {
                        iconSpan.textContent = isSortAscending ? '▲' : '▼';
                    } else {
                        iconSpan.textContent = '';
                    }
                }
            });
        }

        function updateView() {
            renderTable();
            calculateGPAs();
            updateCourseDropdown();
            saveData();
        }

        function renderTable() {
            const tbody = document.getElementById('courseList');
            tbody.innerHTML = '';
            
            courses.forEach((course, index) => {
                const tr = document.createElement('tr');
                tr.id = `row-${index}`;
                
                if (!course.isIncluded && editingIndex !== index) {
                    tr.className = 'excluded';
                }

                if (editingIndex === index) {
                    // 編集用の時期プルダウンを生成
                    const termOptionsHtml = allTerms.map(t => 
                        `<option value="${t}" ${course.term === t ? 'selected' : ''}>${t}</option>`
                    ).join('');

                    tr.innerHTML = `
                        <td class="text-center">-</td>
                        <td><select class="edit-input edit-term">${termOptionsHtml}</select></td>
                        <td><input type="text" class="edit-input edit-name" value="${course.name}"></td>
                        <td>
                            <select class="edit-input edit-category">
                                <option value="liberal" ${course.category === 'liberal' ? 'selected' : ''}>教養科目</option>
                                <option value="specialized_compulsory" ${course.category === 'specialized_compulsory' ? 'selected' : ''}>専門(必修)</option>
                                <option value="specialized_elective" ${course.category === 'specialized_elective' ? 'selected' : ''}>専門(選択)</option>
                            </select>
                        </td>
                        <td><input type="number" class="edit-input-num edit-credits" value="${course.credits}" min="1"></td>
                        <td><input type="number" class="edit-input-num edit-score" value="${course.score}" min="0" max="100"></td>
                        <td>-</td>
                        <td class="text-center action-buttons">
                            <button class="btn btn-success btn-sm" onclick="saveEdit(${index})">保存</button>
                            <button class="btn btn-secondary btn-sm" onclick="cancelEdit()">取消</button>
                        </td>
                    `;
                } 
                else {
                    tr.innerHTML = `
                        <td class="text-center">
                            <input type="checkbox" ${course.isIncluded ? 'checked' : ''} onchange="toggleInclude(${index})" style="transform: scale(1.3);">
                        </td>
                        <td>${course.term}</td>
                        <td>${course.name}</td>
                        <td>${getCategoryName(course.category)}</td>
                        <td>${course.credits}</td>
                        <td>${course.score}</td>
                        <td>${course.gradePoint.toFixed(1)}</td>
                        <td class="text-center action-buttons">
                            <button class="btn btn-edit btn-sm" onclick="startEdit(${index})">訂正</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteCourse(${index})">削除</button>
                        </td>
                    `;
                }
                tbody.appendChild(tr);
            });

            updateSortIcons();
        }

        function calcStandardGPA(filteredCourses) {
            let totalCredits = 0;
            let totalPoints = 0;
            filteredCourses.forEach(c => {
                totalCredits += c.credits;
                totalPoints += c.credits * c.gradePoint;
            });
            return { gpa: totalCredits > 0 ? totalPoints / totalCredits : 0, credits: totalCredits, points: totalPoints };
        }

        function calcTopElectiveGPA(electives, maxCredits) {
            const sorted = [...electives].sort((a, b) => b.gradePoint - a.gradePoint);
            let usedCredits = 0;
            let totalPoints = 0;

            for (let c of sorted) {
                if (usedCredits >= maxCredits) break;
                let creditsToTake = Math.min(c.credits, maxCredits - usedCredits);
                usedCredits += creditsToTake;
                totalPoints += creditsToTake * c.gradePoint;
            }
            
            return { gpa: usedCredits > 0 ? totalPoints / usedCredits : 0, credits: usedCredits, points: totalPoints };
        }

        function calculateGPAs() {
            const department = document.getElementById('departmentSelect').value;
            const maxElectiveCredits = (department === 'pharmacy') ? 10 : 14;

            document.getElementById('electiveNote1').innerText = `(※成績上位${maxElectiveCredits}単位分のみ計算)`;
            document.getElementById('electiveNote2').innerText = `(※選択科目は上位${maxElectiveCredits}単位分のみ合算)`;

            const activeCourses = courses.filter(c => c.isIncluded);

            const liberal = activeCourses.filter(c => c.category === 'liberal');
            const compulsory = activeCourses.filter(c => c.category === 'specialized_compulsory');
            const elective = activeCourses.filter(c => c.category === 'specialized_elective');

            const libData = calcStandardGPA(liberal);
            const compData = calcStandardGPA(compulsory);
            const eleData = calcTopElectiveGPA(elective, maxElectiveCredits);

            const totalValidCredits = libData.credits + compData.credits + eleData.credits;
            const totalValidPoints = libData.points + compData.points + eleData.points;
            const totalGPA = totalValidCredits > 0 ? totalValidPoints / totalValidCredits : 0;

            document.getElementById('gpaLiberal').innerText = libData.gpa.toFixed(2);
            document.getElementById('gpaCompulsory').innerText = compData.gpa.toFixed(2);
            document.getElementById('gpaElective').innerText = eleData.gpa.toFixed(2);
            document.getElementById('gpaTotal').innerText = totalGPA.toFixed(2);
        }
    </script>
</body>
</html>
